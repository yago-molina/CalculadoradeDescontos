<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <title>Calculadora de vendas</title>
</head>
<body>
    <section class="card">
        <h2>Calculadora de vendas</h2>
        <form id="calc-form">
            <label for="preco">Preço do produto (R$)</label>
            <input type="number" id="preco" step="0.01" placeholder="Ex: R$150,00">

            <label for="taxa">Taxa do site (%)</label>
            <input type="number" id="taxa" step="0.5" placeholder="Ex: 12">

            <label for="desconto">Desconto adicional (R$)</label>
            <input type="number" id="final" step="0.01" placeholder="Ex: R$10,00" required>

            <button type="button" onclick="calcular()">Calcular Lucro</button>
        </form>

        <section id="resultado" class="hidden">
            <p>Valor da Taxa: <span id="out-taxa"></span></p>
            <p>Lucro Final: <strong id="out-lucro"></strong></p>
        </section>


        <script src="../script/script.js"></script>
    </section>
</body>
</html>
